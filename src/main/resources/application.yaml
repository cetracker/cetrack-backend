spring:
  profiles:
    group:
      demo: postgres, demo-data
    active: default
  devtools:
    add-properties: false
  jackson:
    datatype:
      datetime:
        adjust-dates-to-context-time-zone: false
  jpa:
    open-in-view: false
server:
  port: 8080
  servlet:
    context-path: /api
logging:
  level:
    root: WARN
    org.springframework: INFO
    de.cyclingsir: INFO

app:
  mytourbook:
    workdir: ${java.io.tmpdir}/cetrack-mytourbook
    max-decompressed-bytes: 524288000  # 500 MB
    tour-person-id: 0
    tour-type-ids: [0, 1, 2, 4, 113]

# Actuator Endpoints
management:
  endpoint:
    health:
      probes:
        enabled: true #  "liveness" and "readiness" (set by K8s?)
  endpoints:
    web:
      exposure:
        include: health,info,loggers

---

spring:
  config:
    activate:
      on-profile: debug-log
  devtools:
    add-properties: on
logging:
  level:
    root: WARN
    org.springframework: INFO
    org.springframework.web.filter: DEBUG # Logging incoming requests see RequestLoggingFilterConfig
    de.cyclingsir.cetrack: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG

---

spring:
  config:
    activate:
      on-profile: local
  servlet:
    multipart:
      max-file-size: 512KB
      max-request-size: 512KB
  flyway:
    enabled: true
    locations: classpath:db/migration/postgres
  security:
    user:
      name: user
      password: pwd
app:
    mytourbook:
      workdir: ${user.home}/tmp/cetracker
      max-decompressed-bytes: 367001600  # 350 MB

# open more actuator endpoints for local testing
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,prometheus

---

spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cetracker}
    username: ${POSTGRES_USER:cet}
    password: ${POSTGRES_PASSWORD:components}
    hikari:
      pool-name: ${spring.application.name}
  jpa:
    hibernate:
      ddl-auto: ${hibernate.ddl:validate}
  flyway:
    enabled: true
    locations: classpath:db/migration/postgres
