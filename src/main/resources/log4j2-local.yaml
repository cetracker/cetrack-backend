Configuration:
  status: warn

  Appenders:
    Console:
      name: CONSOLE
      target: SYSTEM_OUT
      PatternLayout:
        Pattern: "%d{yyyy-MM-dd'T'HH:mm:ss,SSSZ}{Europe/Berlin} %highlight{[%p]} [%c{3}] [%t] [%X{calculationID}] %m%n"
    RollingFile:
      - name: FILE
        fileName: logs/cetracker.log
        filePattern: "logs/cetracker-%i.log"
        PatternLayout:
          Pattern: "%d{yyyy-MM-dd'T'HH:mm:ss,SSSZ}{Europe/Berlin} [%p] [%c{3}] [%t] %m%n"
        policies:
          OnStartupTriggeringPolicy: {}
        DefaultRolloverStrategy:
          max: 5

  Loggers:
      Root:
        level: info
        AppenderRef:
          - ref: CONSOLE
          - ref: FILE
      Logger:
        - name: org.hibernate.SQL
          additivity: false
          level: warn
          AppenderRef:
            - ref: CONSOLE
            - ref: FILE
        - name: org.hibernate.stat
          additivity: false
          level: warn
          AppenderRef:
            - ref: CONSOLE
            - ref: FILE
        - name: org.hibernate.type.descriptor.sql
          additivity: false
          level: warn
          AppenderRef:
            - ref: CONSOLE
            - ref: FILE
