spring:
  flyway:
    enabled: false

app:
  mytourbook:
    work-dir: ${java.io.tmpdir}/cetrack-mytourbook-test
    max-decompressed-bytes: 524288000
    tour-person-id: 0
    tour-type-ids: [0, 1, 2, 4, 113]
management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080
  servlet:
    context-path: /api
