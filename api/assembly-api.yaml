openapi: 3.0.3
info:
  title: Cycling Equipment API
  description: >
    The API documentation for tracking cycling equipment - component assemblies:
    named physical groups of components mounted to a bike as one unit.
    Finalized at CE-0086 plan time under the api-designer gate.
  version: 2.0.0
  license:
    name: (c) CyclingSir
  contact:
    name: CyclingSir
    url: https://github.com/cyc1ingsir
servers:
  - url: http://localhost:8080/{basePath}
    description: the default server url
    variables:
      basePath:
        default: api
tags:
  - name: Assemblies
    description: Component assemblies, their slots, membership and mounting as a unit
  - name: Memberships
    description: >
      Assembly slot membership history (component occupies a slot over a time
      interval); read access plus administrative correction of a
      memberFrom/memberTo data-entry error, cascading to the governed
      mounting it produced.

paths:
  /memberships:
    get:
      operationId: getMemberships
      description: >
        returns assembly slot membership facts filtered by slot and/or
        component and/or point in time. At least one of slotId/componentId is
        required (400 otherwise) to avoid full-table dumps. activeAt returns
        the memberships whose interval contains that instant. Empty list when
        none match.
      tags:
        - Memberships
      parameters:
        - name: slotId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: componentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: activeAt
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssemblyMemberships'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /memberships/{membershipId}/action/correct:
    parameters:
      - $ref: '#/components/parameters/membershipId'
    post:
      operationId: correctMembership
      description: >
        Administrative correction of a data-entry error: adjusts memberFrom
        and/or memberTo of this membership. An explicit null memberTo
        re-opens the membership (makes it active again); the currently-active
        membership (memberTo absent) may be corrected too. Re-validated
        against both assembly_membership exclusion constraints - no overlap
        per component, none per slot (409 MEMBERSHIP_OVERLAP). An empty
        correction, or memberTo not after memberFrom, is 400
        CORRECTION_INVALID. Cascades per boundary to the governed mounting it
        produced: mountedAt moves when it equalled the old memberFrom,
        dismountedAt moves when it equalled the old memberTo; a boundary that
        doesn't match (assembly mounted later, or an adopted direct mounting)
        is left untouched. The cascaded mounting is re-validated with the
        existing mounting overlap checks (409 MOUNTING_OVERLAP).
      tags:
        - Memberships
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectMembershipRequest'
      responses:
        '200':
          description: corrected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssemblyMembership'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /memberships/{membershipId}/action/void:
    parameters:
      - $ref: '#/components/parameters/membershipId'
    post:
      operationId: voidMembership
      description: >
        Administrative removal of a membership that never happened (erratum).
        Allowed on closed memberships only (memberTo set) - voiding the
        currently-active membership is rejected with 409
        MEMBERSHIP_VOID_BLOCKED (use removeMember to end it instead). Deletes
        the membership; every governed mounting overlapping the membership
        interval is resolved by provenance rather than requiring full
        coincidence - one created within this membership is deleted, one
        adopted from a pre-existing direct mounting is de-adopted (governance
        link cleared, row otherwise untouched). Use voidAssemblyMounting
        instead when the error is on the assembly mounting itself.
      tags:
        - Memberships
      responses:
        '204':
          description: voided
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies:
    get:
      operationId: getAssemblies
      description: returns all component assemblies; empty list when none exist
      tags:
        - Assemblies
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assemblies'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createAssembly
      description: creates a new component assembly
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssemblyInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assembly'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
    get:
      operationId: getAssembly
      description: >
        returns the assembly with its slots and their membership at the given
        time (default now), plus the derived complete flag (every active slot
        has an active member)
      tags:
        - Assemblies
      parameters:
        - name: at
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assembly'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: modifyAssembly
      description: modifies name/position of an existing assembly
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssemblyInput'
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assembly'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteAssembly
      description: >
        Deletes the assembly. Rejected with 409 (ASSEMBLY_IN_USE) while
        membership or mounting history exists.
      tags:
        - Assemblies
      responses:
        '204':
          description: deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}/slots:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
    post:
      operationId: createAssemblySlot
      description: adds a slot to the assembly (slots may be added/removed over time via validity interval)
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssemblySlotInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssemblySlot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}/slots/{slotId}:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
      - $ref: '#/components/parameters/slotId'
    put:
      operationId: modifyAssemblySlot
      description: modifies a slot (name, accepted type, validity interval)
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssemblySlotInput'
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssemblySlot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteAssemblySlot
      description: >
        Removes the slot. Rejected with 409 (ASSEMBLY_SLOT_IN_USE) while
        membership history or slot mappings reference it - end its validity
        interval instead.
      tags:
        - Assemblies
      responses:
        '204':
          description: deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}/mountings:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
    get:
      operationId: getAssemblyMountings
      description: returns the assembly's mounting history (when it was on which bike); empty list when none exist
      tags:
        - Assemblies
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssemblyMountings'
        '404':
          $ref: '#/components/responses/NotFound'
  /assemblies/{assemblyId}/mountings/{mountingId}/action/correct:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
      - $ref: '#/components/parameters/mountingId'
    post:
      operationId: correctAssemblyMounting
      description: >
        Administrative correction of a data-entry error: adjusts mountedAt
        and/or dismountedAt of this assembly mounting. An explicit null
        dismountedAt re-opens the assembly mounting (makes it active again);
        the currently-active assembly mounting (dismountedAt absent) may be
        corrected too. Re-validated against the per-assembly non-overlap
        constraint (409 ASSEMBLY_MOUNTING_OVERLAP). An empty correction, or
        dismountedAt not after mountedAt, is 400 CORRECTION_INVALID. Cascades
        to every governed mounting: a governed mounting whose mountedAt
        equalled the old assembly mountedAt moves with it, unless it is an
        adopted pre-existing direct mounting (adoption predates the assembly
        mount and is left untouched); a governed mounting whose dismountedAt
        equalled the old assembly dismountedAt moves with it regardless of
        adoption, since dismountAssembly imposed that boundary on it too.
        Each touched governed mounting is re-validated with the existing
        mounting overlap checks (409 MOUNTING_OVERLAP).
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectAssemblyMountingRequest'
      responses:
        '200':
          description: corrected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssemblyMounting'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}/mountings/{mountingId}/action/void:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
      - $ref: '#/components/parameters/mountingId'
    post:
      operationId: voidAssemblyMounting
      description: >
        Administrative removal of an assembly mounting that never happened
        (erratum). Allowed on active and closed assembly mountings alike -
        unlike voidMembership, there is no dismount-first requirement: on an
        active mounting, adopted rows are still open, so de-adoption restores
        them exactly, whereas forcing a dismount first would stamp a fake
        dismountedAt that de-adoption could not undo. Every governed mounting
        is resolved by provenance: one created by this assembly mounting (or
        by a membership within it) is deleted; one that pre-existed as a
        direct mounting and was adopted is de-adopted instead - its
        assemblyMountingId is cleared and the row otherwise left untouched
        (including any dismountedAt this assembly mounting's own dismount
        imposed on it - the mounting fact stays true, only the governance
        link is removed). The assembly mounting row itself is then deleted.
        Memberships are untouched (assembly-internal facts, independent of
        mounting history).
      tags:
        - Assemblies
      responses:
        '204':
          description: voided
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}/action/addMember:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
    post:
      operationId: addAssemblyMember
      description: >
        Adds a component to a slot from the given time. Component type must
        match the slot's accepted type; component must not be retired and must
        not already be a member of another assembly. A currently
        directly-mounted component MAY be added to a NOT-mounted assembly -
        the membership does not dismount it; it stays directly mounted until
        the assembly is itself mounted later (at which point same-mount-point
        adoption or a different-mount-point conflict applies, per
        mountAssembly below). When the slot is already occupied, this is an
        atomic swap: the occupant's
        membership is closed at the given time (and, while the assembly is
        MOUNTED, its governed mounting too) before the new member is added -
        parity with the bike-side auto-dismount on mountComponent. While the
        assembly is MOUNTED, the new member is also mounted onto the slot's
        resolved mount point (ADR-0003 steps 1-4); an optional mountPointId
        answers an otherwise-unresolved slot and is persisted as a SlotMapping
        (ask-once). mountPointId is ignored (400 if given) while the assembly
        is not mounted - there is no bike to key a SlotMapping. The response
        envelope's membershipChanges always includes the added member, plus
        the removed occupant on a swap.
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '200':
          description: member added; effects envelope (mounting created when assembly is mounted)
          content:
            application/json:
              schema:
                $ref: './common-api.yaml#/components/schemas/MountingChanges'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}/action/removeMember:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
    post:
      operationId: removeAssemblyMember
      description: >
        Ends a component's membership at the given time. While the assembly is
        MOUNTED, the member's governed mounting is closed as well (ADR-0001 §2
        in reverse); the effects envelope reports it.
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveMemberRequest'
      responses:
        '200':
          description: member removed; effects envelope
          content:
            application/json:
              schema:
                $ref: './common-api.yaml#/components/schemas/MountingChanges'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}/action/planMount:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
    post:
      operationId: planMountAssembly
      description: >
        Dry-run resolution for mounting this assembly on a bike (ADR-0003):
        for every filled slot, candidates = the bike's mount points accepting
        the slot's type, filtered by the assembly's position when set, then a
        stored slot mapping. Returns the full plan - resolved slots and
        unresolved slots with their candidates - without changing anything.
        The client asks the user once for each unresolved slot, then calls
        mount with slotResolutions. Genuine impossibilities (incomplete
        assembly, no candidate for a slot, member mounted elsewhere) are
        reported per slot in the plan, not as an error status.
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanMountRequest'
      responses:
        '200':
          description: resolution plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MountPlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}/action/mount:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
    post:
      operationId: mountAssembly
      description: >
        Mounts the complete assembly on a bike as one unit, atomically
        (ADR-0001 §1): every filled slot is resolved to one mount point
        (ADR-0003 - position filter, stored slot mapping, or a slotResolution
        passed here, which is then persisted as a slot mapping); all member
        mountings are created/adopted in one transaction. Any conflict rejects
        the whole mount with 409 - final codes: ASSEMBLY_INCOMPLETE,
        UNRESOLVED_SLOTS (candidates in details), SLOT_UNMOUNTABLE,
        SLOT_TARGET_COLLISION, MEMBER_MOUNTED_ELSEWHERE, MOUNTING_GOVERNED,
        ASSEMBLY_ALREADY_MOUNTED, BIKE_RETIRED.
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MountAssemblyRequest'
      responses:
        '200':
          description: mounted; result incl. effects envelope and remembered slot mappings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssemblyMountResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assemblies/{assemblyId}/action/dismount:
    parameters:
      - $ref: '#/components/parameters/assemblyId'
    post:
      operationId: dismountAssembly
      description: >
        Closes the assembly mounting and all member mountings it governs at
        the given time.
      tags:
        - Assemblies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DismountAssemblyRequest'
      responses:
        '200':
          description: dismounted; result incl. effects envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssemblyMountResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    assemblyId:
      name: assemblyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    slotId:
      name: slotId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    membershipId:
      name: membershipId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    mountingId:
      name: mountingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: './common-api.yaml#/components/schemas/Error'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: './common-api.yaml#/components/schemas/Error'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: './common-api.yaml#/components/schemas/Error'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: './common-api.yaml#/components/schemas/Error'
  schemas:
    Assembly:
      type: object
      description: >
        A named physical group of components mounted to a bike as one unit.
        The read model carries the slots with their membership at the
        requested time and the derived complete flag.
      required:
        - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        positionId:
          type: string
          format: uuid
          description: optional position ("front wheel" is front on every bike, ADR-0003)
        complete:
          type: boolean
          readOnly: true
          description: every active slot has an active member (precondition to mount)
        mounted:
          type: boolean
          readOnly: true
          description: has an active assembly mounting
        slots:
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/AssemblySlot'
        createdAt:
          type: string
          format: date-time
          readOnly: true
    AssemblyInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        positionId:
          type: string
          format: uuid
    Assemblies:
      type: array
      items:
        $ref: '#/components/schemas/Assembly'
    AssemblySlot:
      type: object
      description: >
        A slot within an assembly accepting exactly one component type. The
        read model carries the member active at the requested time.
      required:
        - name
        - componentTypeId
        - validFrom
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        componentTypeId:
          type: string
          format: uuid
        validFrom:
          type: string
          format: date-time
        validTo:
          type: string
          format: date-time
        memberComponentId:
          type: string
          format: uuid
          readOnly: true
          description: component occupying the slot at the requested time, if any
        memberFrom:
          type: string
          format: date-time
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
    AssemblySlotInput:
      type: object
      required:
        - name
        - componentTypeId
        - validFrom
      properties:
        name:
          type: string
        componentTypeId:
          type: string
          format: uuid
        validFrom:
          type: string
          format: date-time
        validTo:
          type: string
          format: date-time
    AssemblyMounting:
      type: object
      description: temporal fact - the assembly as a unit on a bike over a time interval
      required:
        - id
        - assemblyId
        - bikeId
        - mountedAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        assemblyId:
          type: string
          format: uuid
        bikeId:
          type: string
          format: uuid
        mountedAt:
          type: string
          format: date-time
        dismountedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
          readOnly: true
    AssemblyMountings:
      type: array
      items:
        $ref: '#/components/schemas/AssemblyMounting'
    AssemblyMembership:
      type: object
      description: temporal fact - a component occupies a slot over a time interval
      required:
        - id
        - componentId
        - assemblySlotId
        - assemblyId
        - memberFrom
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        componentId:
          type: string
          format: uuid
        assemblySlotId:
          type: string
          format: uuid
        assemblyId:
          type: string
          format: uuid
          description: denormalized from the slot, like Mounting.bikeId
          readOnly: true
        memberFrom:
          type: string
          format: date-time
        memberTo:
          type: string
          format: date-time
          description: absent/null while the membership is active
        createdAt:
          type: string
          format: date-time
          readOnly: true
    AssemblyMemberships:
      type: array
      items:
        $ref: '#/components/schemas/AssemblyMembership'
    CorrectMembershipRequest:
      type: object
      description: >
        the request must carry at least one of memberFrom / memberTo (an
        explicit-null memberTo counts - it is a re-open); an empty body is
        400 (domain validation).
      properties:
        memberFrom:
          type: string
          format: date-time
          description: >
            sets the member-from time when provided; omitted keeps the
            current value. Explicit null is invalid (400) - a membership
            always has a from time.
        memberTo:
          type: string
          format: date-time
          nullable: true
          description: >
            tri-state - a value sets the member-to time, omitted keeps the
            current value, explicit null re-opens the membership (clears the
            member-to time; rejected with 409 when another membership of the
            same component or in the same slot would overlap the then
            open-ended interval).
    CorrectAssemblyMountingRequest:
      type: object
      description: >
        the request must carry at least one of mountedAt / dismountedAt (an
        explicit-null dismountedAt counts - it is a re-open); an empty body
        is 400 (domain validation).
      properties:
        mountedAt:
          type: string
          format: date-time
          description: >
            sets the mounted-at time when provided; omitted keeps the
            current value. Explicit null is invalid (400) - an assembly
            mounting always has a mounted-at time.
        dismountedAt:
          type: string
          format: date-time
          nullable: true
          description: >
            tri-state - a value sets the dismounted-at time, omitted keeps
            the current value, explicit null re-opens the assembly mounting
            (clears the dismounted-at time; rejected with 409 when another
            assembly mounting of the same assembly would overlap the then
            open-ended interval).
    AddMemberRequest:
      type: object
      required:
        - componentId
        - slotId
        - from
      properties:
        componentId:
          type: string
          format: uuid
        slotId:
          type: string
          format: uuid
        from:
          type: string
          format: date-time
        mountPointId:
          type: string
          format: uuid
          description: >
            Answers resolution for this member while the assembly is mounted;
            persisted as a SlotMapping. Ignored (400) while unmounted.
    RemoveMemberRequest:
      type: object
      required:
        - componentId
        - to
      properties:
        componentId:
          type: string
          format: uuid
        to:
          type: string
          format: date-time
    PlanMountRequest:
      type: object
      required:
        - bikeId
        - at
      properties:
        bikeId:
          type: string
          format: uuid
        at:
          type: string
          format: date-time
    SlotResolution:
      type: object
      description: one slot resolved to one mount point
      required:
        - slotId
        - mountPointId
      properties:
        slotId:
          type: string
          format: uuid
        mountPointId:
          type: string
          format: uuid
    Candidate:
      type: object
      description: one bike mount point eligible to receive a slot's component type
      required:
        - mountPointId
        - mountPointName
      properties:
        mountPointId:
          type: string
          format: uuid
        mountPointName:
          type: string
        positionId:
          type: string
          format: uuid
    PlannedSlot:
      type: object
      description: resolution state of one slot in a mount plan
      required:
        - slotId
        - state
      properties:
        slotId:
          type: string
          format: uuid
        componentId:
          type: string
          format: uuid
          description: absent when state is empty (no active member in the slot)
        state:
          type: string
          enum:
            - resolved
            - unresolved
            - impossible
            - empty
        mountPointId:
          type: string
          format: uuid
          description: set when state is resolved
        resolvedBy:
          type: string
          enum:
            - uniqueCandidate
            - positionFilter
            - slotMapping
          description: >
            set when state is resolved; uniqueCandidate = single candidate
            pre-position-filter, positionFilter = the position filter reduced
            candidates to one, slotMapping = a stored SlotMapping matched
        willDismountComponentId:
          type: string
          format: uuid
          description: >
            set when state is resolved and the target mount point is currently
            occupied by a direct (non-member) mounting that will be evicted
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/Candidate'
          description: set when state is unresolved - the user picks one
        reasonCode:
          type: string
          enum:
            - noCandidate
            - positionFilterEmpty
            - memberMountedElsewhere
            - occupiedByGovernedMounting
          description: set when state is impossible - machine-readable cause
        reason:
          type: string
          description: set when state is impossible - human-readable cause
    MountPlan:
      type: object
      required:
        - assemblyId
        - bikeId
        - at
        - mountable
        - slots
      properties:
        assemblyId:
          type: string
          format: uuid
        bikeId:
          type: string
          format: uuid
        at:
          type: string
          format: date-time
        mountable:
          type: boolean
          description: >
            true when the assembly is complete and every slot is resolved or
            empty (no slot is unresolved or impossible); still may require
            slotResolutions in the mount call for slots the client left
            unresolved after asking the user - the frontend keys its dialog
            off each PlannedSlot's state == unresolved, not off this flag alone
        slots:
          type: array
          items:
            $ref: '#/components/schemas/PlannedSlot'
    MountAssemblyRequest:
      type: object
      required:
        - bikeId
        - at
      properties:
        bikeId:
          type: string
          format: uuid
        at:
          type: string
          format: date-time
        slotResolutions:
          type: array
          description: user answers for slots the plan reported unresolved; persisted as slot mappings
          items:
            $ref: '#/components/schemas/SlotResolution'
    DismountAssemblyRequest:
      type: object
      required:
        - at
      properties:
        at:
          type: string
          format: date-time
    AssemblyMountResult:
      type: object
      required:
        - assemblyMounting
        - changes
      properties:
        assemblyMounting:
          $ref: '#/components/schemas/AssemblyMounting'
        changes:
          $ref: './common-api.yaml#/components/schemas/MountingChanges'
        rememberedSlotMappings:
          type: array
          description: slot mappings persisted from this mount's slotResolutions (ADR-0003 ask-once)
          items:
            $ref: './bike-api.yaml#/components/schemas/SlotMapping'
