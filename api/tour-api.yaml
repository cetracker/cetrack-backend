openapi: 3.0.3
info:
  title: Cycling Equipment API
  description: The API documentation for tracking cycling equipment and parts - tour related definitions
  version: 1.0.0
  license:
    name: (c) CyclingSir
  contact:
    name: CyclingSir
    url: https://github.com/cyc1ingsir
servers:
  - url: http://localhost:8080/{basePath}
    description: the default server url
    variables:
      basePath:
        default: api
tags:
  - name: Tours
    description: Tour related definitions
  - name: MyTourbookImport
    description: Direct import from a MyTourbook Derby database archive

paths:
  /tours:
    get:
      operationId: getTours
      description: returns all unfiltered tours
      tags:
        - Tours
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tours'
        '204':
          description: No Content
        '400':
          description: Bad Request
        '404':
          description: Not Found
    post:
      operationId: createTour
      description: creates a new tour
      tags:
        - Tours
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tour'
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tour'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /tours/upload:
    post:
      operationId: uploadTours
      description: upload tour list exported from MyTourbook
      tags:
        - Tours
      requestBody:
        required: true
        content:
          'text/plain; charset=utf-8':
            schema:
              type: string
      responses:
        '201':
          description: The Uploaded file was successfully processed
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /tours/import:
    post:
      operationId: importTours
      description: import tours exported from MyTourbook Derby DB as JSON from DBeaver
      tags:
        - Tours
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MTTours'
      responses:
        '201':
          description: The Uploaded file was successfully processed
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /tours/mytourbook/import-sessions:
    post:
      operationId: stageMyTourbookImport
      summary: Stage a MyTourbook Derby database archive for import
      description: >
        Upload a compressed MyTourbook Derby database archive (application/octet-stream).
        Backend unpacks, queries Derby read-only, classifies candidate tours, and persists
        an import session. Any existing PENDING session is superseded atomically.
      tags:
        - MyTourbookImport
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Archive staged; import session created
          headers:
            Location:
              description: URL of the created import session
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSession'
        '400':
          description: Archive invalid or unreadable (ARCHIVE_INVALID)
        '422':
          description: Derby schema incompatible with this backend release (DERBY_SCHEMA_INCOMPATIBLE)
        '500':
          description: Internal Server Error

  /tours/mytourbook/import-sessions/pending:
    get:
      operationId: getPendingMyTourbookImportSession
      summary: Get the current PENDING import session, if any
      description: >
        Returns the single active PENDING import session. At most one PENDING session
        exists at any time (Decision 9). Returns 404 when no session is awaiting review.
      tags:
        - MyTourbookImport
      responses:
        '200':
          description: Active PENDING session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSession'
        '404':
          description: No PENDING session exists

  /tours/mytourbook/import-sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    get:
      operationId: getMyTourbookImportSession
      summary: Get an import session with candidates, warnings, and drift info
      tags:
        - MyTourbookImport
      responses:
        '200':
          description: Import session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSession'
        '404':
          description: Session not found (IMPORT_SESSION_NOT_FOUND)

  /tours/mytourbook/import-sessions/{sessionId}/commit:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: commitMyTourbookImport
      summary: Commit approved candidate tours to the database
      description: >
        Persist the approved subset of candidate tours to the database.
        The session must be PENDING; a SUPERSEDED or COMMITTED session returns 409.
      tags:
        - MyTourbookImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitImportRequest'
      responses:
        '201':
          description: Tours committed successfully
        '400':
          description: Bad Request (e.g. approvedMtTourIds not in session candidates)
        '404':
          description: Session not found (IMPORT_SESSION_NOT_FOUND)
        '409':
          description: Session already superseded or committed (IMPORT_SESSION_SUPERSEDED)

  /tours/{tourId}:
    parameters:
      - $ref: '#/components/parameters/tourId'
    get:
      operationId: getTour
      description: returns a single tour
      tags:
        - Tours
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tour'
        '400':
          description: Bad Request
        '404':
          description: Not Found
  /tours/{tourId}/action/relate:
    parameters:
      - $ref: '#/components/parameters/tourId'
      - $ref: '#/components/parameters/bikeId'
    post:
      operationId: relateBikeToTour
      description: relates a bike to the tour
      tags:
        - Tours
      responses:
        '200':
          description: o.k.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tour'
        '400':
          description: Bad Request
        '404':
          description: Not Found

components:
  parameters:
    tourId:
      name: tourId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    bikeId:
      name: bikeId
      in: query
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Tour:
      type: object
      required:
       - title
       - distance
       - durationMoving
       - altUp
       - altDown
       - powerTotal
       - startedAt
       - startYear
       - startMonth
       - startDay
      properties:
        id:
          type: string
          format: uuid
          description: id of the created tour
          readOnly: true
        title:
          type: string
          description: tour's model name
        distance:
          type: integer
          minimum: 0
        durationMoving:
          type: integer
          format: int64
          minimum: 0
        altUp:
          type: integer
          minimum: 0
          description: tour's summed up elevation in meters
        altDown:
          type: integer
          minimum: 0
          description: tour's summed up descent in meters
        powerTotal:
          type: integer
          format: int64
          minimum: 0
          description: tour's summed up power values in Watt
        startedAt:
          type: string
          format: date-time
        startYear:
          type: integer
          format: int16
          description: The year, the tour was started
        startMonth:
          type: integer
          format: int16
          minimum: 1
          maximum: 12
          description: The month, the tour was started
        startDay:
          type: integer
          format: int16
          minimum: 1
          maximum: 31
          description: The day of month, the tour was started
        bike:
          $ref: './bike-api.yaml#/components/schemas/Bike'
        createdAt:
          type: string
          format: date-time
    MTTour:
      type: object
      required:
        - MTTOURID
        - TITLE
        - DISTANCE
        - DURATIONMOVING
        - TOURALTUP
        - TOURALTDOWN
        - POWERTOTAL
        - STARTYEAR
        - STARTMONTH
        - STARTDAY
        - STARTTIMESTAMP
      properties:
        MTTOURID:
          type: string
          description: id for the tour created by MT
        TITLE:
          type: string
          description: tour's model name
        DISTANCE:
          type: integer
          minimum: 0
          description: tour's distance in meters
        DURATIONMOVING:
          type: integer
          format: int64
          minimum: 0
          description: time cycled in seconds
        TIMEELAPSEDDEVICE:
          type: integer
          format: int64
          minimum: 0
          description: time including stops in seconds
        TIMERECORDEDDEVICE:
          type: integer
          format: int64
          minimum: 0
          description: recorded movement by device
        STARTTIMESTAMP:
          type: integer
          format: int64
          minimum: 1
          description: tour's start time in unix epoch
        STARTYEAR:
          type: integer
          format: int16
          description: The year, the tour was started
        STARTMONTH:
          type: integer
          format: int16
          minimum: 1
          maximum: 12
          description: The month, the tour was started
        STARTDAY:
          type: integer
          format: int16
          minimum: 1
          maximum: 31
          description: The day of month, the tour was started
        TOURALTUP:
          type: integer
          minimum: 0
          description: tour's summed up elevation in meters
        TOURALTDOWN:
          type: integer
          minimum: 0
          description: tour's summed up descent in meters
        POWERTOTAL:
          type: integer
          format: int64
          minimum: 0
          description: tour's summed up power values in Watt
        bikeId:
          type: string
          format: uuid
          description: bike used on the tour
    Tours:
      type: array
      items:
        $ref: '#/components/schemas/Tour'
    MTTours:
      type: array
      items:
        $ref: '#/components/schemas/MTTour'
    ImportSession:
      type: object
      required:
        - sessionId
        - status
        - dbVersion
        - hasDrift
        - candidates
        - warnings
      properties:
        sessionId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ImportSessionStatus'
        dbVersion:
          type: integer
          description: Derby DBVERSION read from the uploaded archive
        hasDrift:
          type: boolean
          description: True if dbVersion differs from the stored drift baseline
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/ImportCandidate'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ImportWarning'
    ImportCandidate:
      type: object
      required:
        - mtTourId
        - title
        - startedAt
        - distance
        - durationMoving
      properties:
        mtTourId:
          type: string
          description: MyTourbook tour identifier
        title:
          type: string
        startedAt:
          type: string
          format: date-time
        distance:
          type: integer
          minimum: 0
          description: meters
        durationMoving:
          type: integer
          format: int64
          minimum: 0
          description: seconds
        altUp:
          type: integer
          minimum: 0
        altDown:
          type: integer
          minimum: 0
        powerTotal:
          type: integer
          format: int64
          minimum: 0
        bikeId:
          type: string
          format: uuid
          description: CETracker bike UUID matched from the Derby tag
    ImportWarning:
      type: object
      required:
        - type
        - message
      properties:
        type:
          type: string
          enum:
            - AMBIGUOUS_BIKE
            - LOGICAL_DUPLICATE
          description: |
            AMBIGUOUS_BIKE — tour tagged with more than one tracked bike UUID (tour skipped, not blocked).
            LOGICAL_DUPLICATE — tour not yet known by mtTourId but matches an existing tour by start time + distance + moving duration; likely a re-import from device. Risk: two distinct rides with identical triple-key would both be suppressed (accepted for single-user single-bike-per-tour use).
        mtTourId:
          type: string
          description: Identifies the skipped tour
        message:
          type: string
    ImportSessionStatus:
      type: string
      enum:
        - PENDING
        - SUPERSEDED
        - COMMITTED
    CommitImportRequest:
      type: object
      required:
        - approvedMtTourIds
      properties:
        approvedMtTourIds:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: mtTourIds from the session candidates to persist
